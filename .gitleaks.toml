title = "gitleaks config for fsxn-cyber-resilience-patterns"

[extend]
useDefault = true

[[rules]]
id = "internal-ip-address"
description = "Internal/private IP addresses"
regex = '''(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2[0-9]|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3})'''
tags = ["ip", "internal"]

[[rules]]
id = "aws-account-id-context"
description = "AWS Account ID in suspicious context"
regex = '''(?:arn:aws|account[_-]?id|ACCOUNT).*?(\d{12})'''
tags = ["aws", "account"]

[[rules]]
id = "netapp-internal"
description = "NetApp internal references"
regex = '''(?:@netapp\.com|\.netapp\.internal|netapp\.corp)'''
tags = ["netapp", "internal"]

[allowlist]
paths = [
    '''\.gitleaks\.toml$''',
    '''node_modules/''',
    '''\.git/''',
    '''parameters/''',
]
# Test files use RFC-5737/placeholder values (123456789012, 10.0.x.x) per project convention.
regexes = [
    '''123456789012''',
    '''10\.0\.\d{1,3}\.\d{1,3}''',
    '''192\.168\.\d{1,3}\.\d{1,3}''',
]
regexTarget = "match"
