AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSx for ONTAP Cyber Resilience - DR Replication Stack (Phase 2).
  SnapMirror lag monitoring and cross-region replication health checks.
  Deploy in the PRIMARY region (monitors replication TO the DR region).

# -------------------------------------------------------------------
# Parameters
# -------------------------------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: fsxn-cyber-resilience

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, production]

  PrimaryFileSystemId:
    Type: String
    Description: Primary FSx for ONTAP file system ID.

  PrimaryManagementEndpoint:
    Type: String
    Description: Primary FSx for ONTAP management endpoint DNS.

  FsxAdminSecretArn:
    Type: String
    Description: Secrets Manager ARN for fsxadmin credentials.

  DrRegion:
    Type: String
    Default: us-west-2
    Description: DR target region (must differ from deployment region).

  SnapMirrorRpoMinutes:
    Type: Number
    Default: 15
    Description: Expected SnapMirror RPO in minutes. Alert when lag exceeds 2x this value.

  SecurityAlertTopicArn:
    Type: String
    Description: SNS topic ARN for alert notifications.

# -------------------------------------------------------------------
# Resources
# -------------------------------------------------------------------
Resources:

  # ---------------------------------------------------------------
  # Lambda - SnapMirror Lag Monitor
  # ---------------------------------------------------------------
  LagMonitorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-dr-lag-monitor-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: LagMonitorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref FsxAdminSecretArn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SecurityAlertTopicArn
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'

  LagMonitorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-dr-lag-monitor-${Environment}'
      Runtime: python3.12
      Handler: lag_monitor.handler
      Timeout: 60
      MemorySize: 128
      Architectures: [arm64]
      Role: !GetAtt LagMonitorRole.Arn
      Environment:
        Variables:
          MANAGEMENT_ENDPOINT: !Ref PrimaryManagementEndpoint
          SECRET_ARN: !Ref FsxAdminSecretArn
          SNS_TOPIC_ARN: !Ref SecurityAlertTopicArn
          RPO_MINUTES: !Ref SnapMirrorRpoMinutes
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          """SnapMirror lag monitor — checks replication health."""
          import json, logging, os, boto3
          from datetime import datetime, timezone

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              # Placeholder — full implementation in solutions/ontap-native/lambda/
              logger.info("DR Lag Monitor invoked")
              return {"status": "ok", "checked": 0}
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Layer
          Value: data-protection

  # ---------------------------------------------------------------
  # EventBridge Scheduler - 5-minute lag check
  # ---------------------------------------------------------------
  LagMonitorSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectName}-dr-lag-check-${Environment}'
      ScheduleExpression: 'rate(5 minutes)'
      State: ENABLED
      Targets:
        - Id: LagMonitorTarget
          Arn: !GetAtt LagMonitorLambda.Arn

  LagMonitorPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LagMonitorLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt LagMonitorSchedule.Arn

  # ---------------------------------------------------------------
  # CloudWatch Alarm - SnapMirror Lag
  # ---------------------------------------------------------------
  SnapMirrorLagAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-snapmirror-lag-${Environment}'
      AlarmDescription: !Sub >
        CRITICAL: SnapMirror lag exceeds ${SnapMirrorRpoMinutes}x2 minutes.
        DR copy may be stale — investigate replication health.
      Namespace: FsxOntapCyberResilience
      MetricName: SnapMirrorLagMinutes
      Dimensions:
        - Name: Environment
          Value: !Ref Environment
        - Name: Project
          Value: !Ref ProjectName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 2
      Threshold: !Ref SnapMirrorRpoMinutes
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref SecurityAlertTopicArn
      TreatMissingData: notBreaching
      Tags:
        - Key: Project
          Value: !Ref ProjectName

# -------------------------------------------------------------------
# Outputs
# -------------------------------------------------------------------
Outputs:
  LagMonitorLambdaArn:
    Description: DR Lag Monitor Lambda ARN
    Value: !GetAtt LagMonitorLambda.Arn

  SnapMirrorLagAlarmArn:
    Description: SnapMirror lag alarm ARN
    Value: !GetAtt SnapMirrorLagAlarm.Arn
