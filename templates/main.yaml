AWSTemplateFormatVersion: '2010-09-09'
Description: >
  FSx for ONTAP Cyber Resilience Patterns - Root Stack.
  Orchestrates nested stacks for network, storage, scanning, event-driven response,
  observability, and data protection layers.

# -------------------------------------------------------------------
# Parameters
# -------------------------------------------------------------------
Parameters:
  ProjectName:
    Type: String
    Default: fsxn-cyber-resilience
    Description: Project name used for resource naming and tagging.

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - production
    Description: Deployment environment.

  TemplatesBucketName:
    Type: String
    Description: S3 bucket containing nested stack templates.

  TemplatesPrefix:
    Type: String
    Default: templates/
    Description: S3 key prefix for nested stack templates.

  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: First availability zone.

  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Second availability zone.

  NotificationEmail:
    Type: String
    Default: ''
    Description: Email for security alert notifications (passed to Event-Driven stack).

# -------------------------------------------------------------------
# Resources
# -------------------------------------------------------------------
Resources:

  # ---------------------------------------------------------------
  # Network Stack
  # ---------------------------------------------------------------
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL: !Sub 'https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/${TemplatesPrefix}network.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        AvailabilityZone1: !Ref AvailabilityZone1
        AvailabilityZone2: !Ref AvailabilityZone2
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: network

  # ---------------------------------------------------------------
  # Storage Stack
  # ---------------------------------------------------------------
  StorageStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    DependsOn: NetworkStack
    Properties:
      TemplateURL: !Sub 'https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/${TemplatesPrefix}storage.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: storage-native

  # ---------------------------------------------------------------
  # Event-Driven Response Stack
  # ---------------------------------------------------------------
  EventDrivenStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    DependsOn: NetworkStack
    Properties:
      TemplateURL: !Sub 'https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/${TemplatesPrefix}event-driven.yaml'
      Parameters:
        ProjectName: !Ref ProjectName
        Environment: !Ref Environment
        NotificationEmail: !Ref NotificationEmail
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Layer
          Value: event-driven

# -------------------------------------------------------------------
# Outputs
# -------------------------------------------------------------------
Outputs:
  NetworkStackId:
    Description: Network nested stack ID
    Value: !Ref NetworkStack

  StorageStackId:
    Description: Storage nested stack ID
    Value: !Ref StorageStack

  EventDrivenStackId:
    Description: Event-Driven nested stack ID
    Value: !Ref EventDrivenStack

  VpcId:
    Description: VPC ID from Network Stack
    Value: !GetAtt NetworkStack.Outputs.VpcId
